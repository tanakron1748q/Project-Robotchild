<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Unified Navbar</title>
    <!-- Dependencies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
    
    <link rel="stylesheet" href="navbar.css">
    <style>
        body {
            margin: 0;
            background: #f8fafc;
            min-height: 200vh; /* For testing scroll blur */
        }
        .content {
            max-width: 1280px;
            margin: 50px auto;
            padding: 0 24px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <div class="content">
        <h1>Navbar Preview</h1>
        <p>นี่คือตัวอย่าง Navbar ที่ปรับปรุงใหม่ให้เป็นมาตรฐานเดียวกัน</p>
        <p>ลองย่อหน้าจอเพื่อดู Responsive และเลื่อนหน้าลงเพื่อดูเอฟเฟกต์ Glassmorphism ครับ</p>
    </div>

    <!-- Script to load the snippet for preview -->
    <script>
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });
    </script>
    <script src="navbar.js"></script>
</body>
</html>
