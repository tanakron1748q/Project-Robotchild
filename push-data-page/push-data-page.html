<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนเรียน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="push-data-page.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <i class="ti ti-robot" aria-hidden="true"></i>
                Robotschild
            </div>
            <ul class="nav-menu" role="list">
                <li><button class="nav-link" data-page="dashboard"><i class="ti ti-layout-dashboard" aria-hidden="true"></i><span>แดชบอร์ด</span></button></li>
                <li><button class="nav-link" data-page="realtime"><i class="ti ti-radio" aria-hidden="true"></i><span>สดตอนนี้</span></button></li>
                <li><button class="nav-link" data-page="daily"><i class="ti ti-calendar-week" aria-hidden="true"></i><span>ประจำวัน</span></button></li>
                <li><button class="nav-link" data-page="students"><i class="ti ti-users" aria-hidden="true"></i><span>นักเรียน</span></button></li>
                <li><button class="nav-link" data-page="checkin"><i class="ti ti-clipboard-check" aria-hidden="true"></i><span>เช็คชื่อ</span></button></li>
                <li><button class="nav-link active" data-page="courses"><i class="ti ti-book" aria-hidden="true"></i><span>คอร์ส</span></button></li>
                <li><button class="nav-link" data-page="export"><i class="ti ti-download" aria-hidden="true"></i><span>ส่งออก</span></button></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="time-chip" aria-live="polite" aria-label="เวลาปัจจุบัน">
                <span class="dot-live" aria-hidden="true"></span>
                <i class="ti ti-clock" aria-hidden="true"></i>
                <span id="clockEl">--:--:--</span>
            </div>
            <button class="avatar-btn" title="ผู้ดูแลระบบ" aria-label="เมนูผู้ใช้">
                <span>A</span>
            </button>
        </div>
    </nav>

    <main class="main-container">
        <div class="form-container">
            <h2>แบบฟอร์มลงทะเบียนเรียน</h2>
        
        <form id="enrollmentForm">
            <!-- โซน 1: ข้อมูลนักเรียน -->
            <fieldset>
                <legend>1. ข้อมูลนักเรียน</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" placeholder="กรอกชื่อ-นามสกุล" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" placeholder="กรอกชื่อเล่น">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="grade">ระดับชั้น</label>
                        <select id="grade" required>
                            <option value="">-- เลือกชั้นเรียน --</option>
                            <option value="ม.4">ม.4</option>
                            <option value="ม.5">ม.5</option>
                            <option value="ม.6">ม.6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="school">โรงเรียน</label>
                        <input type="text" id="school" placeholder="ชื่อโรงเรียน">
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" placeholder="08X-XXX-XXXX" required>
                </div>
            </fieldset>

            <!-- โซน 2: คอร์สเรียน -->
            <fieldset>
                <legend>2. ข้อมูลคอร์สเรียน</legend>
                <div class="form-group">
                    <label for="course">เลือกคอร์สเรียน</label>
                    <select id="course" required>
                        <option value="" data-price="0">-- กรุณาเลือกคอร์ส --</option>
                        <option value="CS101" data-price="3500">Basic Programming (3,500 บาท)</option>
                        <option value="WD201" data-price="4500">Web Development (4,500 บาท)</option>
                        <option value="MA101" data-price="3000">Mathematics (3,000 บาท)</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ราคาเต็ม (บาท)</label>
                        <input type="number" id="unitPrice" class="readonly-input" readonly placeholder="0">
                    </div>
                </div>
            </fieldset>

            <!-- โซน 3: การเงิน -->
            <fieldset>
                <legend>3. การชำระเงิน</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="discount">ส่วนลด (บาท)</label>
                        <input type="number" id="discount" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>ยอดสุทธิ (บาท)</label>
                        <input type="number" id="netAmount" class="readonly-input highlight-amount" readonly placeholder="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="paymentMethod">วิธีชำระเงิน</label>
                        <select id="paymentMethod" required>
                            <option value="transfer">โอนเงินผ่านธนาคาร</option>
                            <option value="cash">เงินสด</option>
                            <option value="credit">บัตรเครดิต</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="status">สถานะ</label>
                        <select id="status" required>
                            <option value="paid">ชำระแล้ว</option>
                            <option value="pending">ค้างชำระ</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- โซน 4: ตารางเรียน -->
            <fieldset class="no-border">
                <legend>4. ตารางเรียนและอุปกรณ์</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="learnDate">วันที่เริ่มเรียน</label>
                        <input type="date" id="learnDate" required>
                    </div>
                    <div class="form-group">
                        <label for="equipment">อุปกรณ์ที่ได้รับ (ถ้ามี)</label>
                        <input type="text" id="equipment" placeholder="เช่น หนังสือเรียน เล่ม 1">
                    </div>
                </div>
            </fieldset>

            <button type="submit" class="submit-btn">บันทึกข้อมูลเข้าระบบ</button>
        </form>
    </main>

    <script src="push-data-page.js"></script>
</body>
</html>
